<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>花牌肉鸽</title>
    <style>
      :root {
        --bg-top: #f4efe1;
        --bg-bottom: #d9c8a7;
        --panel: rgba(23, 20, 14, 0.85);
        --ink: #f8f1df;
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Noto Serif SC", "Microsoft YaHei", serif;
        background: radial-gradient(circle at 20% 10%, var(--bg-top), var(--bg-bottom));
      }
      #app {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }
      canvas { border-radius: 14px; box-shadow: 0 28px 60px rgba(0, 0, 0, 0.28); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
